version: "3.8"
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/expense-tracker
    depends_on:
      - mongo

  client:
    build:
      context: ./client
    ports:
      - "5173:80" # maps host:5173 -> container:80 (nginx)
    depends_on:
      - server

volumes:
  mongo-data: